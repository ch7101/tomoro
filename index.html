<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class='container'>
        <div class='up'>
            <div class='title'>
                <h1>TOMORO</h1>
                <p>
                    오늘의 데이터가 <br>
                    내일의 기억을 지킵니다.
                </p>
            </div>

            <!-- 로그인-->
            <div class='login'>
                <label class='logine'>
                    <img src="images/email.png" class="icon">
                    <input type="email" placeholder="이메일">
                </label>

                <label class='logine'>
                    <img src="images/password.png" class="icon">
                    <input type="password" placeholder="비밀번호">
                </label>
            </div>
        </div>
        <div class='startarea'>
            <!-- 시작 버튼-->
            <div class='startbtn'>
                <button id='startbtn'>
                <span>시작하기</span>
                <img src="images/arrow.png" class="arrow" alt="arrow">
                </button>
            </div>

            <!-- 회원가입-->
            <div class='signup'>
                <a href="/signup">회원가입</a>
            </div>

            <div class='background'>
                <img src='images/back1.png' class="back1">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
