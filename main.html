<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class='container'>
        <!-- 상단 -->
        <div class="header">
            <div class='header_text'>
                <p> Hello!</p>
                <h1>TOMORO</h1>
            </div>

            <div class='alarm'>
                <img src="images/alarm.png" alt="alarm">
            </div>
        </div>

        <!-- 퀘스트 진행률 -->
        <div class="quest">
            <div class='quest_text'>
                <p>오늘의 퀘스트 진행률</p>
            </div>
            <div class='quest_btn'>
                <button id='questbtn'>
                    <span>자세히 보기</span>
                </button>
            </div>
            <div class='progress_circle'>
                <span>85%</span>
            </div>
        </div>

        <!-- 모니터링 알림-->
        <div class="monitoring">
            <div class='monitoring_text'>
                <h2>모니터링 알림</h2>
                <span class='badge'>6</span>
            </div>
                <div class='monitoringcount'>
                    <span>자세히 보기</span>
                </div>
        </div>

    </div>
</body>

</html>
