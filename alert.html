<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="alert.css">
</head>
<body>
    <!--상단 바-->
    <div class="header">
    <button class="back_btn">
        <img src="images/back.png">
    </button>
    <h2>알림 센터</h2>
    <button class="calendar_btn">
        <img src="images/calendar.png">
    </button>
    </div>        
    
    <div class="date_list">
        <div class="date_card">
        <p>5월</p>
        <h2>23</h2>
        <span>금</span>
    
        <div class="date_card">
        <p>5월</p>
        <h2>24</h2>
        <span>토</span>
    </div>

    <div class="date_card">
        <p>5월</p>
        <h3>25</h3>
        <span>일</span>
    </div>

    <div class="date_card">
        <p>5월</p>
        <h2>26</h2>
        <span>월</span>

    <div class="date_card">
        <p>5월</p>
        <h2>27</h2>
        <span>화</span>

    </div>

    <!--필터-->
    <div class="category">

    <button class="active">
    <button>ALL</button>
    <button>긴급</button>
    <button>주의</button>
    <button>일반</button>
    </button>
    </div>

    <!--알림목록-->
    <div class="alert_list">
    <div class="alert_card urgent">
        <p class="type">긴급</p>
        <h3>낙상 위험 감지</h3>
        <div class="bottom">
            <span>🟣 10:00 AM</span>
            <div class="state">확인</div>

        </div>

    </div>



    <div class="alert_card normal">

        <p class="type">일반</p>

        <h3>정기 테스트 완료</h3>

        <div class="bottom">

            <span>🟣 12:00 PM</span>

            <div class="state">확인</div>

        </div>

    </div>

</div>

</div>
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    <!--아래바-->
        <div class='bar'>
            <div class='home'>
                <button id='homebtn'>
                    <img src="images/home.png" class="home" alt="home">
                </button>
            </div>
            <div class='alert'>
                <button id='alertbtn'>
                    <img src="images/alert1.png" class="alert" alt="alert">
                </button>
            </div>
            <div class='setting'>
                <button id='settingbtn'>
                    <img src="images/setting.png" class="setting" alt="setting">
                </button>
            </div>
        </div>
    
</body>
</html>
